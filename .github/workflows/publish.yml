name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      destination:
        description: 'Where to publish'
        required: true
        type: choice
        options:
          - testpypi
          - pypi
        default: 'testpypi'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sanpy
    permissions:
      id-token: write
    
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.11

    - name: Build package
      run: uv build

    - name: Publish to TestPyPI
      if: github.event.inputs.destination == 'testpypi' || (github.event_name == 'release' && contains(github.ref, 'alpha'))
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        
    - name: Publish to PyPI
      if: github.event.inputs.destination == 'pypi' || (github.event_name == 'release' && !contains(github.ref, 'alpha'))
      uses: pypa/gh-action-pypi-publish@release/v1
